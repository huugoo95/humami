name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop]

jobs:
  backend:
    name: Backend · test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Backend tests
        run: ./mvnw -f humami-backend/pom.xml test

      - name: Backend build
        run: ./mvnw -f humami-backend/pom.xml -DskipTests package

  frontend:
    name: Frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: humami-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: humami-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --ci

      - name: Build
        run: npm run build
